name: Validate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # source of truth: mise.toml (keep in sync)
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # source of truth: mise.toml (keep in sync)
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # source of truth: mise.toml (keep in sync)
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # source of truth: mise.toml (keep in sync)
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - name: Lint all PR commits
        run: yarn commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

  pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # source of truth: mise.toml (keep in sync)
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - name: Lint PR title via commitlint
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s' "$PR_TITLE" | yarn commitlint
